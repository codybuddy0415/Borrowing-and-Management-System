<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Labels — SCC Sports Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg:#060a10;--surface:#0d1420;--card:#111c2e;
      --border:rgba(56,189,248,0.15);--primary:#38bdf8;
      --success:#34d399;--text:#e2e8f0;--muted:#64748b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Space Grotesk",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}

    .header{position:sticky;top:0;z-index:100;background:rgba(6,10,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
    .back-btn{display:flex;align-items:center;gap:6px;background:rgba(56,189,248,0.08);border:1px solid var(--border);color:var(--primary);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;font-family:"Space Grotesk",sans-serif;cursor:pointer;text-decoration:none;transition:all .2s;}
    .back-btn:hover{background:rgba(56,189,248,0.15);}
    .header-title{font-size:16px;font-weight:600;}

    .main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 20px;}

    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .top-bar h1{font-size:24px;font-weight:700;}
    .top-bar p{font-size:13px;color:var(--muted);margin-top:3px;}

    .print-btn{background:var(--primary);color:#000;border:none;padding:11px 22px;border-radius:10px;font-size:14px;font-weight:700;font-family:"Space Grotesk",sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;}
    .print-btn:hover{opacity:.85;transform:translateY(-1px);}

    /* LABELS GRID */
    .labels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}

    .label-card{
      background:white;color:#0f172a;
      border-radius:12px;padding:16px;
      display:flex;flex-direction:column;align-items:center;gap:10px;
      border:2px solid #e2e8f0;
      transition:all .2s;
      position:relative;overflow:hidden;
    }
    .label-card::before{
      content:"";position:absolute;top:0;left:0;right:0;height:4px;
      background:linear-gradient(90deg,#38bdf8,#818cf8);
    }
    .label-card:hover{border-color:#38bdf8;box-shadow:0 8px 24px rgba(56,189,248,0.15);}

    .label-school{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;text-align:center;}
    .label-qr{border:1px solid #e2e8f0;border-radius:8px;padding:8px;background:white;}
    .label-id{font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:600;color:#0369a1;background:#e0f2fe;padding:4px 10px;border-radius:6px;letter-spacing:1px;}
    .label-name{font-size:13px;font-weight:700;color:#0f172a;text-align:center;line-height:1.3;}
    .label-cat{font-size:10px;color:#64748b;text-align:center;}
    .label-divider{width:100%;height:1px;background:#e2e8f0;}
    .label-avail{font-size:11px;color:#065f46;background:#d1fae5;padding:3px 10px;border-radius:100px;font-weight:600;}

    /* LOADING */
    .loading{text-align:center;padding:60px;color:var(--muted);}
    .spinner{width:40px;height:40px;border:3px solid rgba(56,189,248,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}

    /* PRINT STYLES */
    @media print {
      body{background:white !important;}
      body::before{display:none;}
      .header,.top-bar .print-btn{display:none !important;}
      .main{max-width:100%;padding:0;}
      .top-bar{margin-bottom:12px;}
      .labels-grid{grid-template-columns:repeat(4,1fr);gap:10px;}
      .label-card{break-inside:avoid;border:1px solid #ddd !important;box-shadow:none !important;}
      .label-card:hover{border-color:#ddd !important;}
    }

    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .label-card{animation:fadeUp .3s ease both;}
  </style>
</head>
<body>

<header class="header">
  <a href="dashboard.html" class="back-btn">← Back</a>
  <div class="header-title">QR Label Generator</div>
  <button class="print-btn" onclick="window.print()">🖨️ Print All Labels</button>
</header>

<div class="main">
  <div class="top-bar">
    <div>
      <h1>Equipment QR Labels</h1>
      <p>Print and attach these labels to your equipment for quick scanning</p>
    </div>
  </div>

  <div id="labelsContainer">
    <div class="loading">
      <div class="spinner"></div>
      Loading equipment...
    </div>
  </div>
</div>

<script>
const API = "api.php";

if (localStorage.getItem("role") !== "admin") {
    window.location.href = "index.html";
}

async function loadAndGenerateLabels() {
    try {
        const res  = await fetch(`${API}?action=get_equipment`);
        const data = await res.json();

        if (!data || data.length === 0) {
            document.getElementById("labelsContainer").innerHTML =
                `<div class="loading"><p>No equipment found. Add equipment first.</p></div>`;
            return;
        }

        const grid = document.createElement("div");
        grid.className = "labels-grid";

        data.forEach((eq, index) => {
            const card = document.createElement("div");
            card.className = "label-card";
            card.style.animationDelay = `${index * 0.05}s`;

            // QR code value — use equipment ID prefixed
            const qrValue = `EQ-${String(eq.id).padStart(3, '0')}`;

            card.innerHTML = `
                <div class="label-school">SCC Sports Office</div>
                <div class="label-qr" id="qr-${eq.id}"></div>
                <div class="label-id">${qrValue}</div>
                <div class="label-name">${eq.name}</div>
                <div class="label-cat">${eq.category}</div>
                <div class="label-divider"></div>
                <div class="label-avail">${eq.available} / ${eq.total} available</div>
            `;

            grid.appendChild(card);
        });

        document.getElementById("labelsContainer").innerHTML = "";
        document.getElementById("labelsContainer").appendChild(grid);

        // Generate QR codes after DOM is ready
        data.forEach(eq => {
            const qrValue = `EQ-${String(eq.id).padStart(3, '0')}`;
            const el = document.getElementById(`qr-${eq.id}`);
            if (el) {
                new QRCode(el, {
                    text:         qrValue,
                    width:        140,
                    height:       140,
                    colorDark:    "#0f172a",
                    colorLight:   "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        });

    } catch (e) {
        document.getElementById("labelsContainer").innerHTML =
            `<div class="loading"><p>Error loading equipment: ${e.message}</p></div>`;
    }
}

loadAndGenerateLabels();
</script>
</body>
</html>
