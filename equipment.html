<!DOCTYPE html>
<html>
<head>
  <title>Available Equipment</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #f8fafc;
      padding: 20px;
    }

    h1 {
      color: #1e293b;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      text-align: left;
      font-size: 12px;
      color: #64748b;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .good { background:#d1fae5; color:#065f46; }
    .fair { background:#fef3c7; color:#92400e; }
    .bad { background:#fee2e2; color:#991b1b; }

    button {
      margin-top: 15px;
      padding: 8px 15px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Available Equipment</h1>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Available</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

  <button onclick="logout()">Logout</button>
</div>

<script>
if (localStorage.getItem("role") !== "borrower") {
  window.location.href = "index.html";
}

let equipments = JSON.parse(localStorage.getItem("equipments")) || [];

function render() {
  let table = document.getElementById("table");
  table.innerHTML = "";

  equipments.forEach(e => {
    let statusClass =
      e.avail === 0 ? "bad" :
      e.avail <= 2 ? "fair" : "good";

    let statusText =
      e.avail === 0 ? "Out of Stock" :
      e.avail <= 2 ? "Low Stock" : "Available";

    table.innerHTML += `
      <tr>
        <td>${e.name}</td>
        <td>${e.type}</td>
        <td>${e.avail}</td>
        <td><span class="badge ${statusClass}">${statusText}</span></td>
      </tr>
    `;
  });
}

function logout() {
  localStorage.removeItem("role");
  window.location.href = "index.html";
}

render();
</script>

</body>
</html>
