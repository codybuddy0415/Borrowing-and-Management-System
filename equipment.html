<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Equipment — SCC Sports Office</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── LIGHT THEME ── */
    :root {
      --primary:       #0f172a;
      --primary-dark:  #0a1020;
      --primary-light: #1e293b;
      --secondary:     #14b8a6;
      --light-bg:      #f8fafc;
      --card-bg:       #ffffff;
      --card-top:      #f1f2f3bb;
      --text-primary:  #1e293b;
      --text-secondary:#64748b;
      --border:        #e2e8f0;
      --shadow-sm:     0 1px 3px rgba(0,0,0,0.05);
      --shadow-hover:  0 12px 24px rgba(15,23,42,0.15);
    }

    /* ── DARK THEME ── */
    body.dark {
      --primary:       #818cf8;
      --primary-dark:  #6366f1;
      --primary-light: #a5b4fc;
      --light-bg:      #0f172a;
      --card-bg:       #1e293b;
      --card-top:      #1a2540;
      --text-primary:  #f1f5f9;
      --text-secondary:#94a3b8;
      --border:        #334155;
      --shadow-sm:     0 1px 3px rgba(0,0,0,0.3);
      --shadow-hover:  0 12px 24px rgba(129,140,248,0.15);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--light-bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    h1,h2,h3,h4,h5,h6 {
      font-family: "Poppins", sans-serif;
      font-weight: 600;
      line-height: 1.3;
    }

    /* ── TOP HEADER ── */
    .top-header {
      height: 64px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 clamp(16px, 5vw, 40px);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.3s, border-color 0.3s;
    }

    .top-header h2 {
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .header-date {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Theme toggle */
    .theme-toggle {
      background: var(--light-bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Logout */
    .btn-logout {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    body.dark .btn-logout {
      background: #7f1d1d;
      color: #fca5a5;
    }

    .btn-logout:hover {
      background: #dc2626;
      color: white;
    }

    /* ── MAIN ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(20px, 4vw, 36px) clamp(16px, 5vw, 40px);
    }

    .page-title { font-size: clamp(20px, 4vw, 30px); margin-bottom: 4px; }
    .subtitle   { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }

    /* ── STAT CARDS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .dash-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: all 0.2s, background 0.3s, border-color 0.3s;
    }

    .dash-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .dash-top {
      background: var(--card-top);
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      transition: background 0.3s;
    }

    .dash-top i {
      font-size: 18px;
      color: var(--primary);
      opacity: 0.6;
    }

    .dash-body {
      padding: 18px 20px;
      text-align: center;
    }

    .dash-body h2 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 700;
      color: var(--primary);
      margin: 0;
    }

    .dash-sub {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 5px;
    }

    /* ── SECTION ── */
    .section {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    .section-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .section-header h3 {
      font-size: 16px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header h3 i { color: var(--primary); font-size: 15px; }

    /* Search */
    .search-wrap { position: relative; }

    .search-wrap i {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .search-wrap input {
      padding: 8px 12px 8px 30px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: "Inter", sans-serif;
      background: var(--light-bg);
      color: var(--text-primary);
      outline: none;
      width: 220px;
      transition: all 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15,23,42,0.1);
      background: var(--card-bg);
    }

    body.dark .search-wrap input:focus {
      box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
    }

    .search-wrap input::placeholder { color: var(--text-secondary); }

    /* ── TABLE ── */
    .table-box {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
    }

    thead { background: var(--light-bg); transition: background 0.3s; }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-primary);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--light-bg); }

    .col-name  { font-weight: 500; }
    .col-avail { font-weight: 700; font-size: 15px; }

    /* ── BADGES ── */
    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .good { background: #d1fae5; color: #065f46; }
    .fair { background: #fef3c7; color: #92400e; }
    .bad  { background: #fee2e2; color: #991b1b; }

    body.dark .good { background: #064e3b; color: #a7f3d0; }
    body.dark .fair { background: #78350f; color: #fde68a; }
    body.dark .bad  { background: #7f1d1d; color: #fca5a5; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 52px 24px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 40px;
      color: var(--border);
      margin-bottom: 14px;
      display: block;
    }

    .empty-state p { font-size: 14px; }

    /* ── TABLE FOOTER ── */
    .table-foot {
      padding: 11px 16px;
      background: var(--light-bg);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      transition: background 0.3s;
    }

    /* ── MOBILE CARD LIST ── */
    .mobile-list { display: none; }

    .m-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      transition: background 0.15s;
    }

    .m-item:last-child { border-bottom: none; }
    .m-item:hover { background: var(--light-bg); }

    .m-info { flex: 1; min-width: 0; }

    .m-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .m-type { font-size: 12px; color: var(--text-secondary); }

    .m-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }

    .m-qty {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }

    .m-qty-label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* ══════════════════════
       RESPONSIVE
    ══════════════════════ */
    @media(max-width:768px) {
      .stats { gap: 12px; }
      .section-header { flex-direction: column; align-items: flex-start; }
      .search-wrap, .search-wrap input { width: 100%; }
      .header-date { display: none; }
    }

    @media(max-width:520px) {
      .stats {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .stats .dash-card:last-child { grid-column: 1 / -1; }

      .dash-top  { padding: 11px 14px; font-size: 12px; }
      .dash-body { padding: 14px; }
      .dash-body h2 { font-size: 26px; }
      .dash-sub  { font-size: 11px; }

      .table-box   { display: none; }
      .mobile-list { display: block; }

      .top-header h2 { font-size: 13px; }
      .btn-logout span { display: none; }
      .btn-logout { padding: 8px 10px; }

      .page-title { font-size: 20px; }
      .subtitle   { font-size: 13px; margin-bottom: 16px; }
    }

    @media(max-width:360px) {
      .stats { grid-template-columns: 1fr; }
      .stats .dash-card:last-child { grid-column: auto; }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--light-bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
  </style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header">
  <h2>Sports Equipment System</h2>
  <div class="header-right">
    <span class="header-date" id="currentDate"></span>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
    <button class="btn-logout" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i>
      <span>Logout</span>
    </button>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <h1 class="page-title">Available Equipment</h1>
  <p class="subtitle">Browse current stock and availability for borrowing.</p>

  <!-- STAT CARDS -->
  <div class="stats">
    <div class="dash-card">
      <div class="dash-top">
        <span>Total Equipment</span>
        <i class="fas fa-box"></i>
      </div>
      <div class="dash-body">
        <h2 id="statTotal">0</h2>
        <p class="dash-sub">Item types on record</p>
      </div>
    </div>
    <div class="dash-card">
      <div class="dash-top">
        <span>Available Units</span>
        <i class="fas fa-clipboard-check"></i>
      </div>
      <div class="dash-body">
        <h2 id="statAvail">0</h2>
        <p class="dash-sub">Ready for borrowing</p>
      </div>
    </div>
    <div class="dash-card">
      <div class="dash-top">
        <span>Out of Stock</span>
        <i class="fas fa-times-circle"></i>
      </div>
      <div class="dash-body">
        <h2 id="statOut">0</h2>
        <p class="dash-sub">Currently unavailable</p>
      </div>
    </div>
  </div>

  <!-- EQUIPMENT SECTION -->
  <div class="section">
    <div class="section-header">
      <h3><i class="fas fa-list"></i> Equipment List</h3>
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search equipment..." oninput="search(this.value)">
      </div>
    </div>

    <!-- DESKTOP TABLE -->
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Equipment Name</th>
            <th>Category</th>
            <th>Available</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- MOBILE CARD LIST -->
    <div class="mobile-list" id="mobileList"></div>

    <div class="table-foot">
      <span id="footInfo">Loading...</span>
      <span id="footDate"></span>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem("role") !== "borrower") {
    window.location.href = "index.html";
  }

  const equipments = JSON.parse(localStorage.getItem("equipments")) || [];

  // Date
  const now = new Date();
  document.getElementById("currentDate").textContent = now.toDateString();
  document.getElementById("footDate").textContent = now.toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" });

  // Dark mode — persist preference
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    document.querySelector("#themeBtn i").classList.replace("fa-moon", "fa-sun");
  }

  function toggleTheme() {
    document.body.classList.toggle("dark");
    const icon = document.querySelector("#themeBtn i");
    const isDark = document.body.classList.contains("dark");
    icon.classList.replace(isDark ? "fa-moon" : "fa-sun", isDark ? "fa-sun" : "fa-moon");
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  function getStatus(avail) {
    if (avail === 0) return { cls:"bad",  text:"Out of Stock" };
    if (avail <= 2)  return { cls:"fair", text:"Low Stock" };
    return              { cls:"good", text:"Available" };
  }

  function updateStats() {
    document.getElementById("statTotal").textContent = equipments.length;
    document.getElementById("statAvail").textContent = equipments.reduce((s, e) => s + e.avail, 0);
    document.getElementById("statOut").textContent   = equipments.filter(e => e.avail === 0).length;
  }

  function render(list) {
    const tbody      = document.getElementById("tableBody");
    const mobileList = document.getElementById("mobileList");
    const footInfo   = document.getElementById("footInfo");

    tbody.innerHTML = "";
    mobileList.innerHTML = "";

    if (list.length === 0) {
      const empty = `
        <div class="empty-state">
          <i class="fas fa-box-open"></i>
          <p>No equipment found.</p>
        </div>`;
      tbody.innerHTML = `<tr><td colspan="4">${empty}</td></tr>`;
      mobileList.innerHTML = empty;
      footInfo.textContent = "No records to display";
      return;
    }

    list.forEach(e => {
      const s = getStatus(e.avail);

      tbody.innerHTML += `
        <tr>
          <td class="col-name">${e.name}</td>
          <td>${e.type}</td>
          <td class="col-avail">${e.avail}</td>
          <td><span class="badge ${s.cls}">${s.text}</span></td>
        </tr>`;

      mobileList.innerHTML += `
        <div class="m-item">
          <div class="m-info">
            <div class="m-name">${e.name}</div>
            <div class="m-type">${e.type}</div>
          </div>
          <div class="m-right">
            <div class="m-qty">${e.avail}</div>
            <div class="m-qty-label">available</div>
            <span class="badge ${s.cls}">${s.text}</span>
          </div>
        </div>`;
    });

    const kw = document.getElementById("searchInput").value.trim();
    footInfo.textContent = kw
      ? `Showing ${list.length} of ${equipments.length} records`
      : `Showing all ${list.length} records`;
  }

  function search(keyword) {
    const kw = keyword.trim().toLowerCase();
    render(kw
      ? equipments.filter(e =>
          e.name.toLowerCase().includes(kw) ||
          e.type.toLowerCase().includes(kw))
      : equipments);
  }

  function logout() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
  }

  updateStats();
  render(equipments);
</script>
</body>
</html>
